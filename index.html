  frame.addEventListener('load',function(){try{var doc=frame.contentDocument;if(!doc)return;doc.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var href=a.getAttribute('href')||'';if(/^https?:/i.test(href)){e.preventDefault();window.open(href,'_blank','noopener');return;}e.preventDefault();var base=href.split('/').pop().replace('.html','');var id=(base==='index'||base==='')?'index':base;var s=SCREENS.find(function(x){return x.id===id});if(s)loadScreen(s);});}catch(_){}});

  document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT')return;var n=parseInt(e.key,10);if(n>=1&&n<=SCREENS.length)loadScreen(SCREENS[n-1]);if(e.key==='[')setWidth(+range.value-20,null,false);if(e.key===']')setWidth(+range.value+20,null,false);});
  loadScreen(SCREENS[0]);setWidth(1280,'Desktop',false);
</script>
</body>
</html>
